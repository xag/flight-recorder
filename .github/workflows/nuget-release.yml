name: nuget-release

# Publishes the REAL .NET package to NuGet.org, via Trusted Publishing (OIDC — no stored
# API key). This is the sibling of nuget-publish.yml, which only ever pushed 0.0.0
# name-reservation placeholders; until this workflow existed, `dotnet add package
# flight-recorder` resolved to one of those stubs and installed no code at all.
#
# The version comes from FlightRecorder.csproj, not from an input: the repo is the single
# source of that number, and a release you can trigger with a hand-typed version is a
# release that can disagree with the tree it was built from.

on:
  workflow_dispatch:
    inputs:
      owner:
        description: "NuGet.org package owner (your account username or org)"
        required: true

permissions:
  id-token: write   # required: without it the OIDC token request silently fails
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Never ship a package whose own test suite has not just passed on this commit.
      - name: Test
        working-directory: csharp
        run: dotnet test tests/FlightRecorder.Tests/FlightRecorder.Tests.csproj -c Release

      - name: Pack
        working-directory: csharp
        run: dotnet pack src/FlightRecorder/FlightRecorder.csproj -c Release -o ../out

      # The placeholder guard. nuget-publish.yml publishes 0.0.0 stubs under this very same
      # package id, so the one unrecoverable mistake here is pushing a stub as a release —
      # NuGet versions are immutable, and 0.0.0 is already taken by the reservation.
      - name: Refuse to publish a placeholder
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=(out/*.nupkg)
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "::error::pack produced no .nupkg"; exit 1
          fi
          for nupkg in "${pkgs[@]}"; do
            echo "packed: $nupkg"
            case "$nupkg" in
              *0.0.0.nupkg) echo "::error::$nupkg is a 0.0.0 placeholder, not a release"; exit 1 ;;
            esac
          done

      - name: Authenticate to NuGet.org (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ inputs.owner }}

      # No --skip-duplicate: if this version is already on NuGet, that is a fact worth
      # failing on, not one worth passing over in silence.
      - name: Push
        run: |
          set -euo pipefail
          for nupkg in out/*.nupkg; do
            dotnet nuget push "$nupkg" \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json
          done
