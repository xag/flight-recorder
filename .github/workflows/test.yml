name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync
      - run: uv run pytest tests/ -q

  # The Node suite, and with it the one test that needs a real browser.
  #
  # Playwright is an OPTIONAL peer: the library imports no browser automation library, and nobody
  # who installs flight-recorder should have to download a browser. So test/render.test.mjs skips
  # when playwright is absent — and a skip nothing ever opts into is how an instrument quietly
  # stops being one. CI opts in. That is what makes the skip safe everywhere else.
  js:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run browser
      - run: npm test

  # The .NET port: build, test, and confirm the recorder emits conformant tapes. The Python and
  # Node conformance suites (which glob spec/fixtures/) validate the checked-in dotnet-*.jsonl on
  # their own — so a fork of the tape between runtimes fails somebody's build.
  dotnet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: csharp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet test tests/FlightRecorder.Tests/FlightRecorder.Tests.csproj -c Release
      # The generator self-validates what it writes; run it to a temp dir so CI never mutates
      # the committed fixtures (whose timestamps differ every run).
      - run: dotnet run --project tools/GenFixtures -c Release -- "${{ runner.temp }}/fixtures"
