name: nuget-publish

# NuGet.org publishing via Trusted Publishing (OIDC — no stored API key), in two modes:
#
#   release  pushes the REAL .NET package built from csharp/src/FlightRecorder.
#   reserve  pushes the 0.0.0 name-holding placeholders (already done; kept because it
#            also holds the quern and epure ids, which no other repo reserves).
#
# Both live in THIS file on purpose. A NuGet trusted-publishing policy is bound to a
# workflow FILE NAME, and the estate-publish policy names nuget-publish.yml — a release
# job in any other file is rejected at token exchange with a 401, which is exactly how
# the first attempt failed. Renaming the job is free; re-pointing the policy is not.

on:
  workflow_dispatch:
    inputs:
      owner:
        description: "NuGet.org package owner (your account username or org)"
        required: true
      mode:
        description: "release = push the real package; reserve = push 0.0.0 placeholders"
        required: true
        default: release
        type: choice
        options: [release, reserve]

permissions:
  id-token: write   # required: without it the OIDC token request silently fails
  contents: read

jobs:
  reserve:
    if: inputs.mode == 'reserve'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build placeholder packages
        run: |
          set -euo pipefail
          for id in flight-recorder flightrecorder quern epure; do
            case "$id" in
              flight-recorder|flightrecorder)
                home="flight-recorder"
                desc="Name reserved for flight-recorder: record the answers your code got from the outside world while handling a request, and replay that exact request against the real code." ;;
              quern)
                home="quern"
                desc="Name reserved for quern: rules and vocabulary as data, published as versioned, digest-pinned packages." ;;
              epure)
                home="epure"
                desc="Name reserved for epure: prove a design once over a model, then hold every execution to it at the semantic boundary." ;;
            esac
            mkdir -p "pkg/$id"
            cat > "pkg/$id/$id.csproj" <<EOF
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>netstandard2.0</TargetFramework>
              <PackageId>$id</PackageId>
              <Version>0.0.0</Version>
              <Authors>xag</Authors>
              <Description>$desc https://github.com/xag/$home</Description>
              <PackageProjectUrl>https://github.com/xag/$home</PackageProjectUrl>
              <RepositoryUrl>https://github.com/xag/$home</RepositoryUrl>
              <PackageLicenseExpression>Apache-2.0</PackageLicenseExpression>
            </PropertyGroup>
          </Project>
          EOF
            dotnet pack "pkg/$id/$id.csproj" -c Release -o out
          done
          ls -l out

      - name: Authenticate to NuGet.org (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ inputs.owner }}

      - name: Push placeholders
        run: |
          set -euo pipefail
          for nupkg in out/*.nupkg; do
            dotnet nuget push "$nupkg" \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

  # The real package. Version comes from FlightRecorder.csproj, never from an input: the
  # repo is the single source of that number, and a release triggered with a hand-typed
  # version is one that can disagree with the tree it was built from.
  release:
    if: inputs.mode == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Never ship a package whose own test suite has not just passed on this commit.
      - name: Test
        working-directory: csharp
        run: dotnet test tests/FlightRecorder.Tests/FlightRecorder.Tests.csproj -c Release

      - name: Pack
        working-directory: csharp
        run: dotnet pack src/FlightRecorder/FlightRecorder.csproj -c Release -o ../out

      # The placeholder guard. The reserve job above publishes 0.0.0 stubs under this very
      # same package id, so the one unrecoverable mistake here is pushing a stub as a
      # release — NuGet versions are immutable, and 0.0.0 is already taken by the reservation.
      - name: Refuse to publish a placeholder
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=(out/*.nupkg)
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "::error::pack produced no .nupkg"; exit 1
          fi
          for nupkg in "${pkgs[@]}"; do
            echo "packed: $nupkg"
            case "$nupkg" in
              *0.0.0.nupkg) echo "::error::$nupkg is a 0.0.0 placeholder, not a release"; exit 1 ;;
            esac
          done

      - name: Authenticate to NuGet.org (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ inputs.owner }}

      # No --skip-duplicate: if this version is already on NuGet, that is a fact worth
      # failing on, not one worth passing over in silence.
      - name: Push
        run: |
          set -euo pipefail
          for nupkg in out/*.nupkg; do
            dotnet nuget push "$nupkg"               --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"               --source https://api.nuget.org/v3/index.json
          done
