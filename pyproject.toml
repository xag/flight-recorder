[project]
name = "flight-recorder"
version = "0.3.0"
description = "Record tool calls at an app's nondeterminism boundary; replay them deterministically with every internal variable observable"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["flight_recorder"]
